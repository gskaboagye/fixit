<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard - FixIt</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <h2><i class="fas fa-wrench"></i> FixIt</h2>

    <div id="nav-links">
        <a href="index.html"><i class="fas fa-home"></i></a>
        <button onclick="logout()" class="btn-outline small">Logout</button>
    </div>
</nav>

<section class="container">

<!-- HEADER -->
<div class="card">
    <h2><i class="fas fa-tachometer-alt"></i> Dashboard</h2>
    <p class="muted">Manage your service requests</p>
</div>

<!-- TOP GRID -->
<div class="grid grid-2">

    <!-- EARNINGS -->
    <div class="card">
        <h3><i class="fas fa-wallet"></i> Earnings</h3>
        <p id="earnings">₵0 (0 jobs)</p>
    </div>

    <!-- MAP -->
    <div class="card">
        <h3><i class="fas fa-map-marker-alt"></i> Live Tracking</h3>
        <div id="map" style="height:250px; border-radius:10px; background:#f3f4f6;"></div>
    </div>

</div>

<!-- NOTIFICATIONS -->
<div class="card">
    <h3><i class="fas fa-bell"></i> Notifications</h3>
    <ul id="notifications">
        <li class="muted">No notifications yet</li>
    </ul>
</div>

<!-- USER PANEL -->
<div id="user-dashboard">

    <!-- CREATE REQUEST -->
    <div class="card">
        <h3><i class="fas fa-plus-circle"></i> Create Request</h3>

        <!-- ✅ FIX: USE FORM -->
        <form onsubmit="createRequest(event)">
            <input id="service" placeholder="Service (e.g. Plumbing)" required>
            <input id="desc" placeholder="Describe the problem" required>
            <input id="location" placeholder="Your location" required>

            <button type="submit" class="btn-primary">
                Submit Request
            </button>
        </form>
    </div>

    <!-- REQUEST LIST -->
    <div class="card">
        <h3><i class="fas fa-list"></i> Your Requests</h3>
        <ul id="request-list">
            <li class="muted">No requests yet</li>
        </ul>
    </div>

</div>

</section>

<!-- SCRIPTS -->
<script src="https://js.paystack.co/v1/inline.js"></script>

<!-- ⚠️ Keep your key but restrict it in Google Cloud -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBYwvkuLjNmaQs1Q5F4ckcmgkevvUnonnQ&callback=initMap" async defer></script>

<script src="js/config.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/ui.js"></script>

<!-- ✅ MAP INIT (FIXES ERROR) -->
<script id="init_map_fix">
function initMap() {
    const mapDiv = document.getElementById("map");
    if (!mapDiv) return;

    const map = new google.maps.Map(mapDiv, {
        center: { lat: 5.6037, lng: -0.1870 }, // Accra
        zoom: 12
    });
}
</script>

<!-- ✅ PROTECT PAGE -->
<script id="protect_page_fix">
protectPage();
</script>

</body>
</html>
